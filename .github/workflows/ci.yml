name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Linux runners are headless: install Xvfb + python-xlib so the
        # capture/input backends can be exercised. macOS/Windows runners
        # have a real desktop session available.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        shell: bash

      - name: Install Linux headless deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python-xlib
          pip install ".[headless]"

      - name: Lint (ruff)
        run: ruff check src/ tests/
        shell: bash

      - name: Type check (mypy)
        run: mypy src/ || true
        shell: bash
        continue-on-error: true

      - name: Run tests (Linux, under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a -s "-screen 0 1280x720x24" python -m pytest
        shell: bash

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m pytest
        shell: bash

      - name: Self-test (capture/input sanity check)
        # On macOS/Windows this verifies the capture/input backends work in
        # the runner's desktop session. On Linux it's covered by the
        # Xvfb-wrapped pytest run above.
        if: runner.os != 'Linux'
        run: tester --self-test || true
        shell: bash
        continue-on-error: true