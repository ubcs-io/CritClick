# =============================================================================
# tester — example configuration
# =============================================================================
# Copy this file to my_game.toml and edit the values below.
# Environment variables (TESTER_*) take precedence over values in this file.
# =============================================================================

[llm]
# Any OpenAI-compatible endpoint: OpenAI, Azure, vLLM, Ollama, LiteLLM, etc.
api_base = "https://api.openai.com/v1"
# API key (or set TESTER_LLM__API_KEY or OPENAI_API_KEY env var)
api_key = "sk-..."
# Vision-capable model to use
model = "gpt-4o"
# Max tokens for LLM completion. For reasoning models (o1, o3, deepseek-r1) this
# is the TOTAL budget for thinking + output combined. Keep low to cap thinking
# time; raise only if the model consistently returns empty content.
max_tokens = 600
# Only for reasoning/"thinking" models: larger budget used to recover when the
# model spends all of max_tokens on thinking and returns empty content
# (finish_reason="length"). Leave unset for standard models like gpt-4o.
# reasoning_max_tokens = 4096
# Thinking effort for o-series reasoning models (o1, o3): "low", "medium", or "high".
# "low" dramatically reduces thinking tokens for simple UI/click tasks.
# Auto-defaults to "low" for o-series models when unset.
# Leave unset for non-o-series models; ignored by standard models like gpt-4o.
# reasoning_effort = "low"
# Low temperature for deterministic UI interactions
temperature = 0.1
# Per-request timeout in seconds. When set, calls exceeding this duration are
# terminated and retried. Caps runaway thinking on reasoning models.
# Default is 60 s — raise for slow endpoints, set to null to disable entirely.
# timeout = 60.0
# Additional parameters to pass directly in the API request body (model-specific
# options not exposed as top-level config, e.g. vLLM thinking settings).
# extra_body = { chat_template_kwargs = { thinking = false } }
# Max retries for transient LLM failures (rate limits, timeouts)
max_retries = 3
# Base delay in seconds for exponential backoff between retries
retry_delay = 2.0
# ---------------------------------------------------------------------------
# Reasoning / thinking control (keeping LLM calls lean)
# ---------------------------------------------------------------------------
# Separate cap on visible output tokens (NOT thinking tokens). When supported
# by the provider, this is the preferred way to prevent reasoning from stealing
# the entire budget. When None, max_tokens covers both thinking and output.
# Set to a small value (e.g. 300) to enforce short answers regardless of
# thinking depth.
# max_completion_tokens = 300
# Adaptive reasoning throttling: when the estimated reasoning-token ratio
# exceeds this threshold, the harness steps down to a lower max_tokens tier
# for subsequent calls (600 → 450 → 300 → 200). Set to 1.0 to disable.
# min_reasoning_ratio = 0.8

[game]
# Engine type: "renpy", "godot", or "custom"
type = "renpy"
# Path to game directory (or executable for custom games)
path = "./my_game"
# Optional: override auto-detected executable name
# executable = "renpy.sh"
# Game window resolution [width, height].
# Can be overridden at runtime with --mobile, --tablet, and --landscape flags:
#   --mobile           → 390×844 portrait (iPhone 14 Pro)
#   --mobile --landscape → 844×390 landscape
#   --tablet           → 1024×768 portrait (iPad)
#   --tablet --landscape → 768×1024 landscape
resolution = [1280, 720]
# Run "git pull --rebase" before launching (requires git repo)
git_pull = false
# Additional CLI arguments passed to the game executable
# args = ["--debug"]

[harness]
# Maximum number of LLM calls (steps) per playthrough
max_steps = 50
# Seconds to pause after executing each action
wait_after_action = 1.5
# Number of repeated identical actions before stuck warning
stuck_threshold = 3
# Coordinate scale factor (for OS DPI / resolution mismatches)
screen_scale = 1.0
# Headless mode: use a virtual display (Linux + Xvfb). Set to false on
# macOS/Windows dev machines so the game window renders to the real desktop.
# When false, DISPLAY is left untouched and Godot's --no-window is omitted.
headless = false
# Seconds to pause when the LLM returns a 'wait' action
wait_duration = 2.0
# Show a 3-second countdown with failsafe reminder before launching
startup_countdown = true
# ---------------------------------------------------------------------------
# Save / resume support (--save-id CLI flag)
# ---------------------------------------------------------------------------
# When --save-id <ID> is passed on the command line, the harness will:
#   1. At startup, load a previous session's state from runs/<ID>/save_state.json
#      (if it exists) and resume the playthrough where it left off.
#   2. At max_steps - save_before_end_steps, inject a hint into the LLM prompt
#      telling it to click the in-game Save / Save Game button.
#   3. After the save step executes, serialize harness internals to
#      runs/<ID>/save_state.json and stop cleanly.
# Multiple runs using the same --save-id thread together, accumulating step
# history and action counts across runs.
# How many steps before max_steps to trigger the save sequence. At step
# (max_steps - save_before_end_steps), the harness injects a save hint into
# the prompt; after executing that step's action, it saves state and stops.
save_before_end_steps = 2
# ---------------------------------------------------------------------------
# Frame-change detection — cut VLM calls without ever acting blind
# ---------------------------------------------------------------------------
# A cheap grayscale-thumbnail diff (0.0 = identical, 1.0 = maximally different)
# lets the harness skip VLM calls on frames that don't need a fresh decision.
# Every speculative action is still gated by observing the resulting frame.
# Below this delta, two frames are treated as identical ("no effect" / settled).
frame_change_min_delta = 0.02
# At/above this delta, a change is "structural" (new screen/choice/scene) and
# triggers a fresh VLM look. Between the two, changes are "minor" (dialogue rolling).
frame_change_structural_delta = 0.20
# Key pressed to advance dialogue when the model returns action="advance".
advance_key = "space"
# Seconds between frame captures while advancing / polling for stability.
advance_poll_interval = 0.3
# Max dialogue-advance inputs per "advance" decision before returning to the VLM.
# Keep modest so the harness re-parses periodically instead of skipping a whole scene.
advance_max_repeats = 4
# Consecutive "no change" polls that end an advance/wait early.
advance_stable_polls = 2
# When a click leaves the screen unchanged, try the next ranked candidate from the
# same VLM response before spending a new VLM call (falls back to stuck recovery).
candidate_fallback = true
# Save intermediate advance-macro frames to the screenshot dir so visual-defect
# coverage isn't lost on frames that skipped the VLM look.
save_macro_frames = true

[review]
# Player personas for the end-of-run experience review. Each persona becomes its
# own section in NEXT_ACTION.md, written in that player's voice, describing how the
# run would have felt and flagging UX nitpicks (overlapping text, on-screen errors,
# confusing navigation) with the step numbers where they occurred.
# Leave empty (or omit this section) to review the run as a single "Typical player".
# personas = [
#   "Impatient completionist who rushes and hates dead ends",
#   "First-time casual player who is easily confused and notices friction",
#   "Detail-oriented UX critic who flags overlapping text, misalignment, and errors",
# ]
personas = []

[logging]
# Path to structured JSONL log file
log_file = "playthrough_log.jsonl"
# Save per-step screenshots
save_screenshots = true
# Directory for saved screenshots
screenshot_dir = "screenshots"
# Number of recent narrative entries to include in LLM context
step_history_window = 8
# Log level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# Optional: Override prompt templates
# system_prompt = "You are playing a custom game. ..."
# user_prompt_template = "Current context: {context}\nAnalyze the screen..."